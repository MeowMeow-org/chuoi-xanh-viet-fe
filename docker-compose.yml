# Portainer / Git stack: KHÔNG đặt `image: tên-local` nếu chưa push lên registry —
# `docker compose pull` sẽ cố kéo image đó từ Docker Hub và báo "pull access denied".
# Chỉ `build` → Compose tự gắn tag (vd. project_web). Bật "Build" khi deploy stack.
#
# Nginx (service `proxy`): cổng công khai 80 → reverse proxy vào Next (`web:3000`).
# API/Socket.IO vẫn do trình duyệt gọi thẳng NEXT_PUBLIC_API_URL (BE riêng), không đi qua Nginx FE này trừ khi bạn cấu hình thêm location /v1/...
services:
  web:
    container_name: chuoi-xanh-viet-fe
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* được inline lúc build — đổi giá trị phải rebuild image.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/v1/api}
    # Luôn build từ Dockerfile, không cố pull image có sẵn trên registry.
    pull_policy: build
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    # node:20-alpine không có wget — dùng Node (có fetch) để tránh unhealthy giả.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - chuoi-xanh-viet

  proxy:
    image: nginx:1.27-alpine
    container_name: chuoi-xanh-viet-fe-proxy
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - chuoi-xanh-viet

networks:
  chuoi-xanh-viet:
    driver: bridge
