# Portainer / Git stack: KHÔNG đặt `image: tên-local` nếu chưa push lên registry —
# `docker compose pull` sẽ cố kéo image đó từ Docker Hub và báo "pull access denied".
# Chỉ `build` → Compose tự gắn tag (vd. project_web). Bật "Build" khi deploy stack.
#
# Nginx (proxy): 80 + 443 — TLS = Let's Encrypt trên HOST Droplet.
#
# Lần đầu (thiếu file cert thì container proxy không start):
#   1. SSH: sudo mkdir -p /var/www/certbot
#   2. Portainer: Stop stack (hoặc chỉ proxy) để giải phóng cổng 80.
#   3. sudo apt update && sudo apt install -y certbot
#   4. sudo certbot certonly --standalone -d chuoixanhviet.site -d www.chuoixanhviet.site
#   5. Firewall mở TCP 80 + 443. Pull and redeploy stack.
#
# Gia hạn: xem tài liệu certbot renew; có thể cron: certbot renew && docker restart chuoi-xanh-viet-fe-proxy
#
# API qua cùng domain: đặt NEXT_PUBLIC_API_URL=https://chuoixanhviet.site/v1/api (rebuild web).
# Nginx gọi hostname `api` (alias trên chuoi-xanh-net, xem BE docker-compose).
# Cần stack BE đã chạy (tạo network `chuoi-xanh-net`). Nếu chưa có network: `docker network create chuoi-xanh-net`
# hoặc deploy stack BE trước.
services:
  web:
    container_name: chuoi-xanh-viet-fe
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* được inline lúc build — đổi giá trị phải rebuild image.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/v1/api}
    # Luôn build từ Dockerfile, không cố pull image có sẵn trên registry.
    pull_policy: build
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      VIETMAP_TILE_API_KEY: ${VIETMAP_TILE_API_KEY:-}
      VIETMAP_GEOCODE_API_KEY: ${VIETMAP_GEOCODE_API_KEY:-}
      NEXT_PUBLIC_VIETMAP_API_KEY: ${NEXT_PUBLIC_VIETMAP_API_KEY:-}
    # node:20-alpine không có wget — dùng Node (có fetch) để tránh unhealthy giả.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - chuoi-xanh-viet

  proxy:
    container_name: chuoi-xanh-viet-fe-proxy
    build:
      context: ./nginx
      dockerfile: Dockerfile
    pull_policy: build
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # Chứng chứng Let's Encrypt trên host (không đẩy private key lên Git).
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot cho ACME gia hạn: certbot -w /var/www/certbot
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
    networks:
      - chuoi-xanh-viet
      - chuoi-xanh-net

networks:
  chuoi-xanh-viet:
    driver: bridge
  chuoi-xanh-net:
    external: true
    name: chuoi-xanh-net
