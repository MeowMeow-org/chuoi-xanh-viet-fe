# Reverse proxy + TLS (Let's Encrypt trên host: /etc/letsencrypt).
# API: dùng resolver Docker (127.0.0.11) + proxy_pass biến để resolve chuoi-xanh-api lúc request.
# container proxy PHẢI tham gia mạng ngoài `chuoi-xanh-net` (compose BE tạo).
# Kiểm tra: docker network inspect chuoi-xanh-net --format '{{range .Containers}}{{.Name}} {{end}}'
#   phải thấy chuoi-xanh-api (hoặc tên stack-api-*) và chuoi-xanh-viet-fe-proxy.
#   Nginx gọi hostname cố định `api` (network alias trong compose BE). Nếu thiếu proxy:
#   docker network connect chuoi-xanh-net chuoi-xanh-viet-fe-proxy

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream nextjs_upstream {
        server web:3000;
        keepalive 32;
    }

    # --- helpers: proxy tới BE trong Docker (cùng mạng chuoi-xanh-net) ---
    # Đổi tên container nếu khác `chuoi-xanh-api`; port = PORT trong container (thường 8000).
    server {
        listen 443 ssl;
        http2 on;
        server_name chuoixanhviet.site www.chuoixanhviet.site;

        ssl_certificate     /etc/letsencrypt/live/chuoixanhviet.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chuoixanhviet.site/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;

        resolver 127.0.0.11 ipv6=off valid=10s;

        client_max_body_size 25m;

        location ^~ /v1/api {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location ^~ /socket.io/ {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

    server {
        listen 80;
        server_name chuoixanhviet.site www.chuoixanhviet.site;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name 178.128.98.214 _;

        resolver 127.0.0.11 ipv6=off valid=10s;

        client_max_body_size 25m;

        location ^~ /v1/api {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location ^~ /socket.io/ {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }
}
